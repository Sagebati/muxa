# muxa example app — single-file configuration.
# Override any value via env var, e.g. MUXA_WEB__PORT=8080.
#
# Tracing verbosity is controlled via `RUST_LOG` (default: `info`).

[web]
host = "0.0.0.0"
port = 3000

[otel]
service_name = "hello"

[sqlite]
# In-memory by default; perfect for the example. Use e.g.
#   url = "sqlite:./hello.db"
# (and `create_if_missing = true`) for a persistent file.
url = "sqlite::memory:"
create_if_missing = true
max_connections = 5
